<div class="o-auth-scroll">
<div class="o-auth-page">
  <div class="o-auth-box">
    <div class="o-auth-brand">
      <img class="o-auth-logo" src="assets/logo-mark.svg" alt="Orka logo" />
      <span class="o-auth-wordmark">Orka</span>
    </div>
    <div class="o-auth-card">
      <h1 class="o-auth-heading">Reset password</h1>
      <p class="o-auth-sub">We'll send a reset link to your email address.</p>
      @if (error()) {
        <div class="o-error">{{ error() }}</div>
      }
      @if (success()) {
        <div class="o-empty" style="color:var(--o-accent)">{{ success() }}</div>
      }
      @if (!success()) {
        <form class="o-form">
          <div class="o-field">
            <label>Email</label>
            <input class="o-input" type="email" placeholder="you@company.com" [(ngModel)]="form.email" name="email" autocomplete="email" inputmode="email"/>
          </div>
          <ion-button expand="block" [disabled]="loading()" (click)="sendReset()">
            @if (loading()) {
              <ion-spinner name="crescent" slot="start" />Sending...
            } @else {
              Send reset link
            }
          </ion-button>
        </form>
      }
      <div class="o-auth-footer">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
</div>
