<div class="o-auth-scroll">
<div class="o-auth-page">
  <div class="o-auth-box">
    <div class="o-auth-brand">
      <div class="o-auth-mark">O</div>
      <span class="o-auth-wordmark">Orka</span>
    </div>

    <div class="o-auth-card">
      <h1 class="o-auth-heading">Welcome back</h1>

      @if (error()) {
        <div class="o-error">{{ error() }}</div>
      }

      <form (ngSubmit)="login()" #f="ngForm" class="o-form">
        <div class="o-field">
          <label>Email</label>
          <ion-input
            fill="solid"
            type="email"
            placeholder="you@company.com"
            [(ngModel)]="form.email"
            name="email"
            autocomplete="email"
            inputmode="email"
          />
        </div>

        <div class="o-field">
          <label>Password</label>
          <ion-input
            fill="solid"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="form.password"
            name="password"
            autocomplete="current-password"
          />
        </div>

        <ion-button
          type="submit"
          expand="block"
          [disabled]="loading()"
          class="o-btn-submit"
        >
          @if (loading()) {
            <ion-spinner name="crescent" slot="start" />
            Signing in…
          } @else {
            Sign in
          }
        </ion-button>
      </form>

      <div class="o-auth-footer">
        <a href="/register">Create account</a>
        <span>·</span>
        <a href="/forgot-password">Forgot password?</a>
        <span>·</span>
        <span>Need access? Contact your admin.</span>
      </div>
    </div>
  </div>
</div>
</div>
