<div class="o-auth-scroll">
<div class="o-auth-page">
  <div class="o-auth-box">
    <div class="o-auth-brand">
      <img class="o-auth-logo" src="assets/logo-mark.svg" alt="Orka logo" />
      <span class="o-auth-wordmark">Orka</span>
    </div>
    <div class="o-auth-card">
      <h1 class="o-auth-heading">Create your account</h1>
      <p class="o-auth-sub">Enter the access code provided by your hotel or group admin.</p>
      @if (error()) {
        <div class="o-error">{{ error() }}</div>
      }
      <form class="o-form">
        <div class="o-form-grid">
          <div class="o-field">
            <label>Full Name</label>
            <input class="o-input" type="text" placeholder="Jane Smith" [(ngModel)]="form.name" name="name" autocomplete="name"/>
          </div>
          <div class="o-field">
            <label>Email</label>
            <input class="o-input" type="email" placeholder="you@company.com" [(ngModel)]="form.email" name="email" autocomplete="email" inputmode="email"/>
          </div>
          <div class="o-field">
            <label>Phone <span class="o-field-opt">(optional)</span></label>
            <input class="o-input" type="tel" placeholder="+1 555 000 0000" [(ngModel)]="form.phone" name="phone" autocomplete="tel"/>
          </div>
          <div class="o-field">
            <label>Hotel Group Code <span class="o-field-opt">(use one or the other)</span></label>
            <input class="o-input" type="text" placeholder="GRP-XXXX" [(ngModel)]="form.hotelGroupCode" name="hotelGroupCode"/>
          </div>
          <div class="o-field">
            <label>Hotel Code</label>
            <input class="o-input" type="text" placeholder="HTL-XXXX" [(ngModel)]="form.hotelCode" name="hotelCode"/>
          </div>
          <div class="o-field">
            <label>Password</label>
            <input class="o-input" type="password" placeholder="Min 6 characters" [(ngModel)]="form.password" name="password" autocomplete="new-password"/>
          </div>
          <div class="o-field">
            <label>Confirm Password</label>
            <input class="o-input" type="password" placeholder="Repeat password" [(ngModel)]="form.confirmPassword" name="confirmPassword" autocomplete="new-password"/>
          </div>
        </div>
        <ion-button expand="block" [disabled]="loading()" (click)="register()">
          @if (loading()) {
            <ion-spinner name="crescent" slot="start" />Creating account...
          } @else {
            Create account
          }
        </ion-button>
      </form>
      <div class="o-auth-footer">
        <a href="/login">Already have an account? Sign in</a>
      </div>
    </div>
  </div>
</div>
</div>
